<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Sign in · JCDM Technologies LLC</title>
  <meta name="description" content="Sign in or create an account to book faster.">
  <link rel="canonical" href="https://www.jcdmtech.com/login.html">

  <link rel="icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="mask-icon" href="/assets/safari-pinned-tab.svg" color="#C8A24A">

  <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: light)">
  <meta name="color-scheme" content="dark light">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="JCDM Technologies LLC">
  <meta property="og:title" content="Sign in · JCDM Technologies LLC">
  <meta property="og:description" content="Sign in or create an account.">
  <meta property="og:url" content="https://www.jcdmtech.com/login.html">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="header"></div>

  <main class="container" style="max-width:500px;margin:3rem auto;padding:0 clamp(16px,4vw,24px)">
    <p class="hero-kicker" style="margin-bottom:.75rem">Account</p>
    <h1 style="font-family:'Fraunces',Georgia,serif;font-size:clamp(1.8rem,3vw+.5rem,2.4rem);margin:0 0 .5rem;letter-spacing:-.02em">
      Sign in
    </h1>
    <p class="muted" style="margin-bottom:1.75rem">Sign in or create an account to book faster.</p>

    <form id="loginForm" class="card" style="display:grid;gap:1rem" novalidate>
      <label>Email address
        <input type="email" name="email" required autocomplete="email" placeholder="your@email.com" />
      </label>
      <label>Password
        <span class="muted" style="font-weight:400;font-size:.85rem"> (leave empty to receive a magic link)</span>
        <input type="password" name="password" autocomplete="current-password" />
      </label>
      <div class="grid grid-2">
        <button type="submit" class="btn btn-primary">Sign in</button>
        <button type="button" id="signupBtn" class="btn">Create account</button>
      </div>
      <div class="grid grid-2">
        <button type="button" id="magicLinkBtn" class="btn">Sign in with link</button>
        <button type="button" id="resetBtn" class="btn">Forgot password</button>
      </div>
      <p id="loginMsg" class="muted" aria-live="polite" role="status" style="min-height:1.2rem"></p>
    </form>
  </main>

  <div id="footer"></div>

  <script src="/js/supabase.config.js"></script>
  <script src="/js/app.js" defer></script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient(window.__SUPABASE__.url, window.__SUPABASE__.anon);

    const next = new URLSearchParams(location.search).get("next") || "/";
    const form         = document.getElementById("loginForm");
    const msg          = document.getElementById("loginMsg");
    const signupBtn    = document.getElementById("signupBtn");
    const magicLinkBtn = document.getElementById("magicLinkBtn");
    const resetBtn     = document.getElementById("resetBtn");

    // Redirect if already signed in
    {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) location.href = next;
      supabase.auth.onAuthStateChange((_e, s) => { if (s) location.href = next; });
    }

    function setMsg(text, ok = null) {
      msg.textContent = text || "";
      msg.classList.remove("success", "error");
      if (ok === true)  msg.classList.add("success");
      if (ok === false) msg.classList.add("error");
    }

    async function signInWithPassword(email, password) {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      location.href = next;
    }

    async function sendMagicLink(email) {
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: location.origin + next }
      });
      if (error) throw error;
      setMsg("Magic link sent — check your email.", true);
    }

    async function sendPasswordReset(email) {
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + "/login.html?next=" + encodeURIComponent(next)
      });
      if (error) throw error;
      setMsg("Password reset link sent — check your email.", true);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("Processing…");
      const fd       = new FormData(form);
      const email    = (fd.get("email") || "").toString().trim();
      const password = (fd.get("password") || "").toString();

      if (!email) return setMsg("Please enter your email address.", false);

      try {
        if (password) await signInWithPassword(email, password);
        else          await sendMagicLink(email);
      } catch (err) {
        setMsg("Error: " + err.message, false);
      }
    });

    signupBtn.addEventListener("click", async () => {
      setMsg("Creating account…");
      const fd       = new FormData(form);
      const email    = (fd.get("email") || "").toString().trim();
      const password = (fd.get("password") || crypto.randomUUID()).toString();
      if (!email) return setMsg("Enter your email to create an account.", false);

      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        const userId = data.user?.id;
        if (userId) {
          await supabase.from("profiles").upsert({ id: userId, role: "user" }, { onConflict: "id" });
        }
        setMsg("Account created — check your email to confirm.", true);
      } catch (err) {
        setMsg("Error: " + err.message, false);
      }
    });

    magicLinkBtn.addEventListener("click", async () => {
      const email = (new FormData(form).get("email") || "").toString().trim();
      if (!email) return setMsg("Enter your email to receive a magic link.", false);
      try { await sendMagicLink(email); } catch (err) { setMsg("Error: " + err.message, false); }
    });

    resetBtn.addEventListener("click", async () => {
      const email = (new FormData(form).get("email") || "").toString().trim();
      if (!email) return setMsg("Enter your email to reset your password.", false);
      try { await sendPasswordReset(email); } catch (err) { setMsg("Error: " + err.message, false); }
    });
  </script>
</body>
</html>
